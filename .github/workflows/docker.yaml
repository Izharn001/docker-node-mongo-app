name: Docker CI

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag from commit SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image with latest tag
        run: docker build -t izharn007/node-app:latest ./backend

      - name: Tag image with commit SHA
        run: docker tag izharn007/node-app:latest izharn007/node-app:${SHORT_SHA}

      - name: Push latest tag
        run: docker push izharn007/node-app:latest

      - name: Push SHA tag
        run: docker push izharn007/node-app:${SHORT_SHA}